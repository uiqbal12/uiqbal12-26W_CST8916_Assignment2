<!DOCTYPE html>
<html>
<head>
    <title>Analytics Test</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .data { background: #f0f0f0; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Analytics Debug</h1>
    
    <h2>Raw /api/analytics Response:</h2>
    <div id="analytics" class="data">Loading...</div>
    
    <h2>Raw /api/events Response (last 5):</h2>
    <div id="events" class="data">Loading...</div>

    <script>
        // Fetch and display analytics data
        fetch('/api/analytics')
            .then(r => r.json())
            .then(data => {
                document.getElementById('analytics').innerHTML = JSON.stringify(data, null, 2);
            })
            .catch(e => {
                document.getElementById('analytics').innerHTML = 'Error: ' + e;
            });
            
        // Fetch and display events
        fetch('/api/events?limit=5')
            .then(r => r.json())
            .then(data => {
                document.getElementById('events').innerHTML = JSON.stringify(data, null, 2);
            })
            .catch(e => {
                document.getElementById('events').innerHTML = 'Error: ' + e;
            });
    </script>
</body>
</html>
