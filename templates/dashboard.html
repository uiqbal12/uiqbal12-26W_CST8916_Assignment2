<!DOCTYPE html>
<html>
<head>
    <title>Clickstream Analytics Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .event { border: 1px solid #ccc; margin: 10px; padding: 10px; }
        .summary { background: #f0f0f0; padding: 10px; margin: 10px; }
        #events { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Clickstream Analytics Dashboard</h1>
    
    <div class="summary">
        <h3>Event Summary</h3>
        <div id="summary">Loading...</div>
    </div>
    
    <div class="summary">
        <h3>Recent Events</h3>
        <div id="events">Loading...</div>
    </div>

    <script>
        function fetchEvents() {
            fetch('/api/events?limit=20')
                .then(response => response.json())
                .then(data => {
                    // Update summary
                    const summaryDiv = document.getElementById('summary');
                    summaryDiv.innerHTML = '<pre>' + JSON.stringify(data.summary, null, 2) + '</pre>';
                    summaryDiv.innerHTML += `<p>Total events: ${data.total}</p>`;
                    
                    // Update events
                    const eventsDiv = document.getElementById('events');
                    eventsDiv.innerHTML = '';
                    data.events.forEach(event => {
                        const eventDiv = document.createElement('div');
                        eventDiv.className = 'event';
                        eventDiv.innerHTML = `
                            <strong>${event.event_type}</strong> - 
                            Page: ${event.page} - 
                            Time: ${event.server_timestamp || event.client_timestamp || 'N/A'}
                            ${event.product_id ? `<br>Product: ${event.product_id}` : ''}
                            ${event.deviceType ? `<br>Device: ${event.deviceType}, Browser: ${event.browser}, OS: ${event.os}` : ''}
                        `;
                        eventsDiv.appendChild(eventDiv);
                    });
                })
                .catch(error => {
                    console.error('Error fetching events:', error);
                    document.getElementById('events').innerHTML = 'Error loading events';
                });
        }
        
        // Fetch events every 2 seconds
        fetchEvents();
        setInterval(fetchEvents, 2000);
    </script>
</body>
</html>
